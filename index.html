        let questions = [];
        let currentQuestion = 0;
        let answers = {};
        let studentName = "";
        let studentClass = "";
        let studentSubject = "";
        let timeLeft = 3600; //  50mins in seconds
        let timerInterval;

        function getRandomQuestions(questions, number) {
            const shuffled = [...questions].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, number);
        }

        function startExam() {
            const nameInput = document.getElementById("studentName").value.trim();
            if (!nameInput) {
                alert("Please enter your name to start the exam.");
                return;
            }

            const classInput = document.getElementById("studentClass").value.trim();
            if (!classInput) {
                alert("Please enter your class");
                return;
            }
            studentName = nameInput;
            studentClass = classInput;
            studentSubject = document.getElementById('subject').value

            if (studentSubject === 'English-SS1') {
                questions = englishSs1Questions;

            }
            else if (studentSubject === 'English-SS2-SS3') {
                questions = englishSs2Questions;
            }
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("examScreen").classList.remove("hidden");

            questions = getRandomQuestions(questions, 100);
            currentQuestion = 0;
            answers = {};
            buildQuestionNav();
            showQuestion();
            startTimer();
        }

        function startTimer() {
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up! Exam has been submitted.");
                    submitExam();
                }
            }, 1000);
        }

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById("timer").innerText = `Time Left: ${minutes}m ${seconds}s`;
        }

        function showQuestion() {

            const q = questions[currentQuestion];
            const container = document.getElementById("questionContainer");

            // Build question container with instruction on top (inside the same container)
            let html = `
        <div class="title">
            <h2>${studentName}_${studentClass}_${studentSubject} EXAM</h2>
        </div>

        <div class="question">
            ${q.instruction ? `<p style="font-weight:italic; font-style:italic;color:#444;">${q.instruction}</p>` : ""}
            <h3>${q.q}</h3>
    `;

            q.options.forEach((opt, index) => {
                const checked = answers[currentQuestion] === index ? "checked" : "";
                html += `
            <label>
                <input type="radio" name="q${currentQuestion}" value="${index}" ${checked}>
                ${String.fromCharCode(65 + index)}. ${opt}
            </label><br>
        `;
            });

            html += `</div>`;
            container.innerHTML = html;

            updateQuestionNav();
        }


        function nextQuestion() {
            saveAnswer();
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                alert("You are on the last question.");
            }
        }

        function prevQuestion() {
            saveAnswer();
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            } else {
                alert("You are on the first question.");
            }
        }

        function saveAnswer() {
            const selected = document.querySelector(`input[name='q${currentQuestion}']:checked`);
            if (selected) {
                answers[currentQuestion] = parseInt(selected.value);
            }
        }
        function buildQuestionNav() {
            const nav = document.getElementById("questionNav");
            nav.innerHTML = "";

            for (let i = 0; i < questions.length; i++) {
                const div = document.createElement("div");
                div.className = "question-box";
                div.innerText = i + 1;
                div.onclick = () => {
                    saveAnswer();
                    currentQuestion = i;
                    showQuestion();
                    updateQuestionNav();
                };
                nav.appendChild(div);
            }
        }

        function updateQuestionNav() {
            const boxes = document.querySelectorAll(".question-box");

            boxes.forEach((box, index) => {
                box.classList.remove("active");
                box.classList.remove("answered");

                if (index === currentQuestion) {
                    box.classList.add("active");
                }

                if (answers[index] !== undefined) {
                    box.classList.add("answered");
                }
            });
        }

        function submitExam() {
            if (!confirm("Are you sure you want to submit your exam?")) {
                return;
            }

            saveAnswer();
            clearInterval(timerInterval);

            let score = 0;
            questions.forEach((q, i) => {
                if (answers[i] === q.answer) score++;
            });

            const percent = (score / questions.length) * 100;

            document.getElementById("rName").innerHTML = studentName;
            document.getElementById("rScore").innerHTML = score;
            document.getElementById("rClass").innerHTML = studentClass;
            document.getElementById("rSubject").innerHTML = studentSubject;
            document.getElementById("rPercent").innerHTML = ((score / questions.length) * 100).toFixed(2) + "%";
            ;


            document.getElementById("examScreen").classList.add("hidden");
            document.getElementById("resultScreen").classList.remove("hidden");

        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'l',
                unit: 'mm',
                format: [220, 170]
            });
            // width*height


            const img = new Image();
            img.src = "LOGO.png";

            // Wait for image to load or fail
            await new Promise(resolve => {
                img.onload = () => resolve();
                img.onerror = () => resolve();
            });

            // Add logo if loaded
            if (img.complete && img.naturalHeight !== 0) {
                doc.addImage(img, "PNG", 15, 10, 30, 30);
            }

            generateContent(doc);
        }

        function generateContent(doc) {
            // HEADER
            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.setTextColor(128, 0, 32); // burgurdy
            doc.text("AL-QOSIMIYYAH MODEL SCHOOL", 105, 25, { align: "center" });

            doc.setFontSize(16);
            doc.setTextColor(0, 0, 0);
            doc.text(`${studentSubject} RESULT`, 105, 35, { align: "center" });

            // SCORE CALCULATION
            let score = 0;
            questions.forEach((q, i) => { if (answers[i] === q.answer) score++; });
            const percent = ((score / questions.length) * 100).toFixed(2);

            // RESULT TABLE
            const tableData = [
                ["Student Name", studentName],
                ["Student Class", studentClass],
                ["Student Subject", studentSubject],
                ["Score", `${score} / ${questions.length}`],
                ["Percentage", `${percent}%`],
                ["Date", new Date().toLocaleString()]
            ];

            doc.autoTable({
                head: [["ID", "Details"]],
                body: tableData,
                startY: 50,
                theme: "grid",

                headStyles: {
                    fillColor: [128, 0, 32],
                    textColor: 255,
                    fontStyle: "bold"
                },
                styles: {
                    fontSize: 16,
                    textColor: [0, 0, 0]
                },
                columnStyles: {
                    0: { fontStyle: "bold", cellWidth: 60 },
                    1: { cellWidth: 110 }
                }
            });



            // COPYRIGHT
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            doc.text("© 2026 Horlanif Tech. All Rights Reserved.", 105, 150, { align: "center" });

            // SAVE PDF
            doc.save(`${studentName.replace(/\s+/g, '_')}_${studentClass.replace(/\s+/g, '_')}_${studentSubject.replace(/\s+/g, '_')}_Result.pdf`);
        }
